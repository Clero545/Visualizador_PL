<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Base de Dados - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .container-app, .container-admin { max-width: 1200px; margin: 2rem auto; padding: 1rem; }
        .container-admin-login-form { max-width: 400px; margin: auto; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 1rem; }
        .hidden { display: none !important; }
        input, select { border: 1px solid #D1D5DB; padding: 0.5rem; border-radius: 0.375rem; width: 100%; }
        input:focus, select:focus { outline: 2px solid transparent; border-color: #2563EB; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); }
        .pagination-btn { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; transition: all 0.2s; }
        .pagination-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .colunas-visiveis-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem; max-height: 150px; overflow-y: auto; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 0.375rem; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #111827; color: #f3f4f6; }
            .bg-white { background-color: #1f2937; }
            input, select { background-color: #374151; color: #f3f4f6; border-color: #4b5563; }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

    <!-- NOTIFICAÇÃO DE BOAS-VINDAS -->
    <div id="welcomeNotification" class="hidden fixed top-5 left-5 bg-blue-500 text-white py-4 px-6 rounded-lg shadow-lg z-50 transition-all duration-500">
        <span id="welcomeNotificationText"></span>
    </div>

    <!-- TELA LOGIN -->
    <div id="telaLogin" class="container-admin-login-form">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-xl w-full"> 
            <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Acesso ao Sistema</h1>
            <form id="formLogin" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Usuário:</label>
                    <input type="text" id="username" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Senha:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-md hover:bg-blue-700 transition">Entrar</button>
            </form>
            <div class="mt-6 relative text-center">
                <hr class="border-gray-300 dark:border-gray-600">
                <span class="absolute top-[-10px] left-1/2 translate-x-[-50%] bg-white dark:bg-gray-800 px-2 text-sm text-gray-500">ou</span>
            </div>
            <button id="btnGoogleLogin" class="mt-6 w-full flex items-center justify-center bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 py-2 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-2">
                Entrar com Google
            </button>
            <p id="mensagemLogin" class="mt-4 text-sm text-center font-semibold"></p>
        </div>
    </div>

    <!-- TELA ADMIN -->
    <div id="telaAdmin" class="container-admin hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-green-600">Gestão de Usuários</h1>
            <div class="flex space-x-2">
                <button id="botaoVisualizar" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Visualizar</button>
                <button class="logout-btn bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Sair</button>
            </div>
        </header>
        
        <div class="bg-white dark:bg-gray-800 p-6 rounded shadow mb-8">
            <h2 class="text-xl font-bold mb-4">Adicionar Novo Usuário</h2>
            <form id="formAdicionarUsuario" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="newUsername" placeholder="Nome" required>
                <input type="password" id="newPassword" placeholder="Senha" required>
                <button type="submit" class="bg-green-600 text-white rounded py-2 hover:bg-green-700">Criar Usuário</button>
            </form>
            <p id="adminAddUserMessage" class="mt-2 text-sm"></p>
        </div>

        <div id="listaUsuariosAdmin" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- CONTEÚDO PRINCIPAL (USUÁRIO) -->
    <div id="conteudoPrincipal" class="container-app hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600">Visualizador de Dados</h1>
            <div class="flex items-center space-x-4">
                <span id="loggedInUserName" class="font-medium"></span>
                <button id="botaoVoltarAdmin" class="hidden bg-gray-500 text-white px-3 py-1 rounded text-sm hover:bg-gray-600">Painel Admin</button>
                <button class="logout-btn bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">Sair</button>
            </div>
        </header>

        <div class="bg-white dark:bg-gray-800 p-6 rounded shadow-lg mb-6">
            <div id="uploadSection" class="mb-6 border-b dark:border-gray-700 pb-6">
                <h2 class="text-lg font-semibold mb-4 text-gray-700 dark:text-gray-200">Carregar CSV</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="file" id="arquivoCSV" accept=".csv" class="cursor-pointer">
                    <button id="botaoCarregarCSV" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Processar</button>
                </div>
                <p id="mensagemUploadCSV" class="mt-2 text-sm"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 items-end">
                <div>
                    <label class="block text-sm font-medium mb-1">Filtrar por Coluna:</label>
                    <select id="filtroColunaSelect">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Pesquisar:</label>
                    <input type="text" id="filtroPesquisaInput" placeholder="Digite para filtrar..." disabled>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Colunas Visíveis:</label>
                <div id="colunasVisiveisContainer" class="colunas-visiveis-container bg-gray-50 dark:bg-gray-700"></div>
            </div>

            <div class="flex justify-between items-center bg-blue-50 dark:bg-blue-900/30 p-4 rounded-md mb-6">
                <div class="text-center flex-1 border-r dark:border-gray-700">
                    <p class="text-sm opacity-70">Total Registros</p>
                    <p id="totalBase" class="text-2xl font-bold">0</p>
                </div>
                <div class="text-center flex-1">
                    <p class="text-sm opacity-70">Filtrados</p>
                    <p id="pessoasExibidas" class="text-2xl font-bold">0</p>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="botaoExportarCSV" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-md shadow-md transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Exportar Seleção
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="tabelaCabecalho" class="bg-gray-50 dark:bg-gray-700"></thead>
                    <tbody id="tabelaCorpo" class="divide-y dark:divide-gray-700"></tbody>
                </table>
            </div>
            <div id="paginacaoContainer" class="p-4 flex flex-wrap justify-center items-center gap-2 border-t dark:border-gray-700"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURAÇÕES
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ESTADO GLOBAL
        let dataState = {
            raw: [],
            filtered: [],
            headers: [],
            visibleColumns: [],
            currentPage: 1,
            rowsPerPage: 25,
            users: []
        };

        let currentProfile = null;

        // --- BACKEND ---
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');

        async function init() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid));
                
                // Admin Hardcoded ou via Firestore Role
                if (user.email === 'admin@sistema.com' || (userDoc.exists() && userDoc.data().role === 'admin')) {
                    currentProfile = { uid: user.uid, role: 'admin', username: 'Administrador' };
                    showAdmin();
                } else {
                    currentProfile = userDoc.exists() ? { uid: user.uid, ...userDoc.data() } : { uid: user.uid, role: 'user', username: user.displayName || 'Usuário' };
                    showUser();
                }
            } else {
                document.getElementById('telaLogin').classList.remove('hidden');
                document.getElementById('telaAdmin').classList.add('hidden');
                document.getElementById('conteudoPrincipal').classList.add('hidden');
            }
        });

        // --- AUTH & USER MGMT ---
        window.loginComGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, new GoogleAuthProvider());
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', result.user.uid);
                const userDoc = await getDoc(userRef);
                if (!userDoc.exists()) {
                    await setDoc(userRef, { username: result.user.displayName, email: result.user.email, role: 'user' });
                }
            } catch (e) { alert("Erro Google Login: " + e.message); }
        };

        window.loginTradicional = async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase().trim();
            const p = document.getElementById('password').value;

            if (u === 'admin' && p === '090820') {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', auth.currentUser.uid);
                await setDoc(userRef, { username: 'Admin', role: 'admin' }, { merge: true });
                showAdmin();
            } else {
                const match = dataState.users.find(x => x.username.toLowerCase() === u && x.password === p);
                if (match) {
                    currentProfile = match;
                    showUser();
                } else { alert("Usuário ou senha incorretos."); }
            }
        };

        function listenToUsers() {
            onSnapshot(usersRef, (snap) => {
                dataState.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentProfile?.role === 'admin') renderAdminList();
            }, (err) => console.error(err));
        }

        function renderAdminList() {
            const container = document.getElementById('listaUsuariosAdmin');
            container.innerHTML = '';
            dataState.users.filter(u => u.role !== 'admin').forEach(u => {
                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-gray-800 p-4 rounded shadow-md border dark:border-gray-700';
                div.innerHTML = `
                    <div class="space-y-3">
                        <input type="text" value="${u.username}" id="u-${u.id}" class="text-sm">
                        <input type="text" value="${u.password || ''}" id="p-${u.id}" class="text-sm" placeholder="Senha">
                        <div class="flex gap-2">
                            <button onclick="updateUser('${u.id}')" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Salvar</button>
                            <button onclick="deleteUser('${u.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-xs">Apagar</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.updateUser = async (id) => {
            const username = document.getElementById(`u-${id}`).value;
            const password = document.getElementById(`p-${id}`).value;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id), { username, password });
            alert("Usuário atualizado.");
        };

        window.deleteUser = async (id) => {
            if (confirm("Deseja apagar este usuário?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', id));
        };

        window.adicionarUsuario = async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            await setDoc(doc(usersRef), { username, password, role: 'user' });
            document.getElementById('formAdicionarUsuario').reset();
        };

        // --- FRONTEND ENGINE ---
        function showAdmin() {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('telaAdmin').classList.remove('hidden');
            listenToUsers();
        }

        function showUser() {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('telaAdmin').classList.add('hidden');
            document.getElementById('conteudoPrincipal').classList.remove('hidden');
            document.getElementById('loggedInUserName').textContent = currentProfile.username;
            if (currentProfile.role === 'admin') document.getElementById('botaoVoltarAdmin').classList.remove('hidden');
        }

        function parseCSV(text) {
            const rows = text.split(/\r\n|\n/).filter(r => r.trim());
            const headers = rows[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const data = rows.slice(1).map(row => {
                const cols = row.split(',');
                const item = {};
                headers.forEach((h, i) => item[h] = cols[i]?.trim().replace(/^"|"$/g, '') || '');
                return item;
            });
            return { headers, data };
        }

        window.processarCSV = () => {
            const file = document.getElementById('arquivoCSV').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const { headers, data } = parseCSV(e.target.result);
                dataState.headers = headers;
                dataState.raw = data;
                dataState.visibleColumns = [...headers];
                dataState.currentPage = 1;
                renderColumnSelectors();
                renderFilterSelect();
                applyFilter();
                document.getElementById('totalBase').textContent = data.length;
            };
            reader.readAsText(file);
        };

        function renderColumnSelectors() {
            const container = document.getElementById('colunasVisiveisContainer');
            container.innerHTML = '';
            dataState.headers.forEach(h => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${h}" ${dataState.visibleColumns.includes(h) ? 'checked' : ''}> ${h}`;
                label.querySelector('input').onchange = (e) => {
                    if (e.target.checked) dataState.visibleColumns.push(h);
                    else dataState.visibleColumns = dataState.visibleColumns.filter(x => x !== h);
                    applyFilter();
                };
                container.appendChild(label);
            });
        }

        function renderFilterSelect() {
            const sel = document.getElementById('filtroColunaSelect');
            sel.innerHTML = '<option value="">Selecione...</option>';
            dataState.headers.forEach(h => {
                const opt = document.createElement('option'); opt.value = h; opt.textContent = h;
                sel.appendChild(opt);
            });
            document.getElementById('filtroPesquisaInput').disabled = false;
        }

        function applyFilter() {
            const col = document.getElementById('filtroColunaSelect').value;
            const term = document.getElementById('filtroPesquisaInput').value.toLowerCase().trim();
            
            dataState.filtered = col && term 
                ? dataState.raw.filter(x => String(x[col]).toLowerCase().includes(term))
                : dataState.raw;

            document.getElementById('pessoasExibidas').textContent = dataState.filtered.length;
            renderTable();
        }

        function renderTable() {
            const head = document.getElementById('tabelaCabecalho');
            const body = document.getElementById('tabelaCorpo');
            head.innerHTML = ''; body.innerHTML = '';

            if (dataState.visibleColumns.length === 0) return;

            const trH = document.createElement('tr');
            dataState.visibleColumns.forEach(c => {
                const th = document.createElement('th');
                th.className = "px-4 py-3 text-xs font-bold uppercase tracking-wider";
                th.textContent = c; trH.appendChild(th);
            });
            head.appendChild(trH);

            const start = (dataState.currentPage - 1) * dataState.rowsPerPage;
            const pageData = dataState.filtered.slice(start, start + dataState.rowsPerPage);

            pageData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 dark:hover:bg-gray-700 transition";
                dataState.visibleColumns.forEach(c => {
                    const td = document.createElement('td'); td.className = "px-4 py-3 text-sm";
                    td.textContent = row[c] || ''; tr.appendChild(td);
                });
                body.appendChild(tr);
            });
            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('paginacaoContainer');
            container.innerHTML = '';
            const total = Math.ceil(dataState.filtered.length / dataState.rowsPerPage);
            if (total <= 1) return;

            const pages = new Set([1, total, dataState.currentPage, dataState.currentPage - 1, dataState.currentPage + 1]);
            Array.from(pages).filter(p => p >= 1 && p <= total).sort((a,b)=>a-b).forEach(p => {
                const btn = document.createElement('button');
                btn.textContent = p; btn.className = `pagination-btn ${p === dataState.currentPage ? 'active' : ''}`;
                btn.onclick = () => { dataState.currentPage = p; renderTable(); };
                container.appendChild(btn);
            });
        }

        window.exportarCSV = () => {
            if (dataState.filtered.length === 0) return;
            let csv = dataState.visibleColumns.join(',') + '\n';
            dataState.filtered.forEach(row => {
                csv += dataState.visibleColumns.map(c => {
                    let v = String(row[c]);
                    return v.includes(',') ? `"${v}"` : v;
                }).join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `export_${Date.now()}.csv`; a.click();
        };

        // INICIALIZAÇÃO EVENTOS
        window.addEventListener('load', () => {
            init();
            document.getElementById('formLogin').onsubmit = window.loginTradicional;
            document.getElementById('btnGoogleLogin').onclick = window.loginComGoogle;
            document.getElementById('formAdicionarUsuario').onsubmit = window.adicionarUsuario;
            document.getElementById('botaoCarregarCSV').onclick = window.processarCSV;
            document.getElementById('filtroPesquisaInput').oninput = applyFilter;
            document.getElementById('filtroColunaSelect').onchange = applyFilter;
            document.getElementById('botaoExportarCSV').onclick = window.exportarCSV;
            document.querySelectorAll('.logout-btn').forEach(b => b.onclick = () => signOut(auth));
            document.getElementById('botaoVisualizar').onclick = showUser;
            document.getElementById('botaoVoltarAdmin').onclick = showAdmin;
        });
    </script>
</body>
</html>
